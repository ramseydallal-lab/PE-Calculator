<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
    <meta name="referrer" content="no-referrer">

    <title>Redirecting to PE / VTE Calculator</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #003366 0%, #005a8c 50%, #0077b6 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #123;
        }
        .card {
            width: min(640px, calc(100vw - 32px));
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            padding: 32px 28px;
            text-align: center;
        }
        h1 {
            margin: 0 0 8px 0;
            color: #004999;
            font-size: 28px;
        }
        p {
            margin: 0 0 14px 0;
            color: #44525f;
            line-height: 1.6;
            font-size: 15px;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            padding: 14px 20px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0066cc 0%, #004999 100%);
            color: white;
            text-decoration: none;
            font-weight: 700;
        }
        .subtle {
            margin-top: 16px;
            font-size: 12px;
            color: #6b7785;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Postoperative PE / VTE Calculator</h1>
        <p>Redirecting to the validated bedside calculator.</p>
        <p>If the calculator does not open automatically, use the button below.</p>
        <p class="subtle">Public informational tool. Do not enter direct patient identifiers.</p>
        <a href="./output/PE_Risk_Calculator_NSQIP_v3.html">Open Calculator</a>
        <div class="subtle">ACS-NSQIP 2020-2024 locked model release</div>
    </main>
</body>
</html>
